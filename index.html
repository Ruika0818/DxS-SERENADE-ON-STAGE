<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title-meta">DxS [SERENADE] ON STAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .svt-gradient { background: linear-gradient(135deg, #F7CAC9 0%, #92A8D1 100%); }
        .svt-text { background: linear-gradient(135deg, #e89896 0%, #6b8bc0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="svt-gradient text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 id="header-title" onclick="window.location.reload()" class="text-2xl font-black tracking-wider cursor-pointer">💎 載入中...</h1>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-6">
        
        <!-- ================= 首頁列表畫面 ================= -->
        <section id="view-list" class="block">
            
            <!-- 動態頂部自訂區塊 (由後台控制) -->
            <div id="dynamic-top-block" class="mb-8 empty:hidden"></div>

            <div class="text-center py-4 mb-6">
                <h2 id="hero-title" class="text-3xl font-black mb-2 svt-text">載入中...</h2>
                <p class="text-slate-500 text-sm">點擊帶有標籤的歌曲，開始練習應援！</p>
            </div>
            
            <div id="loading" class="text-center text-slate-400 py-10 flex flex-col items-center">
                <svg class="animate-spin h-8 w-8 text-[#92A8D1] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                正在與雲端資料庫同步...
            </div>
            
            <!-- 動態歌單容器 -->
            <div id="song-list-container" class="hidden flex flex-col gap-6 pb-6"></div>

            <!-- 動態底部自訂區塊 (由後台控制) -->
            <div id="dynamic-bottom-block" class="mt-4 mb-10 empty:hidden"></div>
        </section>

        <!-- ================= 單曲教學畫面 (左右分欄) ================= -->
        <section id="view-detail" class="hidden pb-20">
            <button onclick="navigate('list')" class="mb-6 text-[#92A8D1] font-bold flex items-center bg-white px-5 py-2.5 rounded-full shadow-sm hover:bg-slate-50 transition-colors w-fit">
                ← 返回總歌單
            </button>

            <!-- 左右雙欄佈局 -->
            <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 items-start">
                
                <!-- 左側：影片與迷你歌單 -->
                <div class="w-full lg:w-5/12 shrink-0 lg:sticky lg:top-[90px] space-y-4">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="relative w-full" style="padding-bottom: 56.25%;">
                            <iframe id="detail-video" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="p-4 bg-slate-50 border-t border-slate-100">
                            <h2 id="detail-title" class="text-xl font-black text-slate-800"></h2>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <button onclick="toggleMiniList()" class="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 transition-colors">
                            <span class="font-bold text-[#92A8D1] flex items-center gap-2">🎵 演唱會歌單</span>
                            <span id="mini-list-icon" class="text-slate-400 transform transition-transform">▼</span>
                        </button>
                        <div id="mini-list-container" class="hidden max-h-[40vh] overflow-y-auto border-t border-slate-100 bg-slate-50 p-2 space-y-1"></div>
                    </div>
                </div>

                <!-- 右側：歌詞與留言區 -->
                <div class="w-full lg:w-7/12 space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-10">
                        <!-- 歌詞標題與字體大小調整工具列 -->
                        <div class="flex justify-between items-center mb-6 border-b pb-3">
                            <h3 class="text-slate-700 font-bold text-sm flex items-center gap-2">🎤 應援歌詞</h3>
                            <div class="flex items-center gap-1.5 bg-slate-100 p-1 rounded-lg">
                                <span class="text-[11px] text-slate-400 px-1 font-bold">字體</span>
                                <button onclick="changeFontSize(-1)" class="w-7 h-7 bg-white hover:bg-slate-200 text-slate-700 rounded font-bold shadow-xs transition-colors text-xs">A-</button>
                                <button onclick="resetFontSize()" class="w-7 h-7 bg-white hover:bg-slate-200 text-slate-700 rounded font-bold shadow-xs transition-colors text-[10px]">預設</button>
                                <button onclick="changeFontSize(1)" class="w-7 h-7 bg-white hover:bg-slate-200 text-slate-700 rounded font-bold shadow-xs transition-colors text-xs">A+</button>
                            </div>
                        </div>
                        <div id="detail-lyrics" class="leading-[2.5] whitespace-pre-wrap font-medium text-center transition-all duration-200" style="font-size: 1.15rem;"></div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                        <h3 class="text-slate-800 font-bold mb-6 border-b pb-2 text-lg flex items-center gap-2">💬 粉絲應援打氣區</h3>
                        <div class="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-100">
                            <input type="text" id="comment-name" placeholder="你的暱稱 (例如: 克拉💎)" class="w-full mb-3 p-3 rounded-lg border border-slate-200 focus:outline-none focus:border-[#92A8D1]">
                            <textarea id="comment-text" rows="3" placeholder="想說的話，或是建議..." class="w-full mb-3 p-3 rounded-lg border border-slate-200 focus:outline-none focus:border-[#92A8D1]"></textarea>
                            <div class="text-right">
                                <button onclick="submitComment()" id="btn-submit-comment" class="bg-[#92A8D1] hover:bg-[#7a93c2] text-white font-bold px-6 py-2 rounded-lg transition-colors shadow-sm">送出留言</button>
                            </div>
                        </div>
                        <div id="comments-list" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ 請把你的 Firebase Config 貼在這裡取代！
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDbLTRVsas6vglUb_4b7wXv_RfYL3E6Bxg",
            authDomain: "dxs-serenade-on-stage.firebaseapp.com",
            projectId: "dxs-serenade-on-stage",
            storageBucket: "dxs-serenade-on-stage.firebasestorage.app",
            messagingSenderId: "56387976084",
            appId: "1:56387976084:web:e7024f58ceaf038ecb2d81"
        };
        // ==========================================

        let appDb, siteSettings = { title: "載入中...", categories: [] }, songsData = [], currentSongId = null, unsubscribeComments = null;

        // 字體大小控制變數
        let currentFontSize = 1.15; // rem
        window.changeFontSize = function(direction) {
            currentFontSize += direction * 0.15;
            if (currentFontSize < 0.85) currentFontSize = 0.85;
            if (currentFontSize > 2.2) currentFontSize = 2.2;
            document.getElementById('detail-lyrics').style.fontSize = currentFontSize + 'rem';
        }
        window.resetFontSize = function() {
            currentFontSize = 1.15;
            document.getElementById('detail-lyrics').style.fontSize = currentFontSize + 'rem';
        }

        window.showMessage = function(msg) {
            const box = document.createElement('div');
            box.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-[#333] text-white px-6 py-3 rounded-full shadow-xl z-[9999] opacity-0 transition-opacity duration-300';
            box.innerText = msg;
            document.body.appendChild(box);
            setTimeout(() => box.classList.remove('opacity-0'), 10);
            setTimeout(() => { box.classList.add('opacity-0'); setTimeout(() => box.remove(), 300); }, 3000);
        }

        try {
            const app = initializeApp(firebaseConfig);
            appDb = getFirestore(app);
            
            // 監聽全站設定
            onSnapshot(doc(appDb, "settings", "global"), (docSnap) => {
                if (docSnap.exists()) {
                    siteSettings = docSnap.data();
                    updateSiteSettings();
                } else {
                    document.getElementById('loading').innerHTML = '⚠️ 站長尚未在後台初始化網站設定！請先至後台進行「全站設定」。';
                }
            });

            // 監聽歌曲
            const q = query(collection(appDb, "songs"), orderBy("order", "asc"));
            onSnapshot(q, (snapshot) => {
                songsData = [];
                snapshot.forEach((doc) => songsData.push({ id: doc.id, ...doc.data() }));
                if(siteSettings.categories && siteSettings.categories.length > 0) renderList();
                if(document.getElementById('view-detail').classList.contains('hidden') === false) renderMiniList();
            });
        } catch (e) {
            document.getElementById('loading').innerHTML = '⚠️ 資料庫連線失敗，請檢查設定。';
        }

        function updateSiteSettings() {
            document.title = siteSettings.title || "DxS [SERENADE] ON STAGE";
            document.getElementById('site-title-meta').innerText = siteSettings.title || "DxS [SERENADE] ON STAGE";
            document.getElementById('header-title').innerText = siteSettings.title || "DxS [SERENADE] ON STAGE";
            document.getElementById('hero-title').innerText = siteSettings.title || "DxS [SERENADE] ON STAGE";
            document.getElementById('dynamic-top-block').innerHTML = siteSettings.topHtml || "";
            document.getElementById('dynamic-bottom-block').innerHTML = siteSettings.bottomHtml || "";
            renderList();
        }

        function renderList() {
            document.getElementById('loading').classList.add('hidden');
            const container = document.getElementById('song-list-container');
            container.classList.remove('hidden');
            container.innerHTML = '';

            const categories = siteSettings.categories || [];
            
            categories.forEach(categoryName => {
                const songsInCategory = songsData.filter(s => s.category === categoryName);
                if (songsInCategory.length === 0) return; 

                // 💡 修改1：首頁主分類加上 SVT 漸層背景，超顯眼！
                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="svt-gradient px-5 py-3 text-white font-black tracking-widest text-sm md:text-base flex items-center gap-2 shadow-inner">
                            💿 ${categoryName}
                        </div>
                        <div class="divide-y divide-slate-100">
                `;
                
                songsInCategory.forEach((song, index) => {
                    html += `
                        <div onclick="window.navigate('detail', '${song.id}')" class="px-5 py-4 flex items-center justify-between hover:bg-slate-50 cursor-pointer transition-colors group">
                            <div class="flex items-center gap-3 md:gap-4">
                                <span class="text-slate-300 font-mono font-bold w-6 text-right group-hover:text-[#F7CAC9] transition-colors">${index + 1}.</span>
                                <span class="font-bold text-slate-700 group-hover:text-[#92A8D1] transition-colors text-lg">${song.title}</span>
                            </div>
                            <span class="text-[10px] md:text-xs bg-[#F7CAC9]/20 border border-[#F7CAC9] text-[#e87a78] px-2 py-1 rounded font-bold whitespace-nowrap shadow-sm">應援教學</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        window.navigate = function(view, id = null) {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            if (view === 'list') {
                document.getElementById('detail-video').src = ""; 
                if(unsubscribeComments) unsubscribeComments();
            }
            document.getElementById(`view-${view}`).classList.remove('hidden');
            window.scrollTo(0, 0);
            if (view === 'detail' && id) renderDetail(id);
        }

        window.toggleMiniList = function() {
            const list = document.getElementById('mini-list-container');
            const icon = document.getElementById('mini-list-icon');
            list.classList.toggle('hidden');
            icon.style.transform = list.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function renderMiniList() {
            const container = document.getElementById('mini-list-container');
            container.innerHTML = '';
            const categories = siteSettings.categories || [];
            categories.forEach(cat => {
                const songs = songsData.filter(s => s.category === cat);
                if (songs.length === 0) return;
                
                // 💡 修改2：側邊迷你歌單的分類也加上明顯的底色與左側邊框
                container.innerHTML += `<div class="bg-slate-100/80 border-l-4 border-[#92A8D1] text-xs font-bold text-slate-600 px-3 py-1.5 mt-3 mb-1 rounded-r">${cat}</div>`;
                
                songs.forEach(song => {
                    const isActive = song.id === currentSongId;
                    container.innerHTML += `<div onclick="window.navigate('detail', '${song.id}')" class="px-3 py-2 text-sm rounded-lg cursor-pointer ${isActive ? 'bg-[#92A8D1]/10 text-[#92A8D1] font-bold' : 'text-slate-600 hover:bg-slate-100'}">${song.title}</div>`;
                });
            });
        }

        function renderDetail(id) {
            currentSongId = id;
            const song = songsData.find(s => s.id === id);
            if (!song) return;
            document.getElementById('detail-title').innerText = song.title;
            let embedUrl = `https://www.youtube.com/embed/${song.videoId}`;
            if (song.startTime) embedUrl += `?start=${song.startTime}`;
            document.getElementById('detail-video').src = embedUrl;
            
            let safeText = (song.lyrics || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safeText = safeText.replace(/\[([^\[\]]+)\]/g, '<span class="text-[#E91E63] font-black text-xl md:text-2xl mx-1 block md:inline">$1</span>');
            safeText = safeText.replace(/\{([^{}]+)\}/g, '<span class="text-[#92A8D1] font-bold text-[0.95em] mx-1 block md:inline bg-[#92A8D1]/10 px-2 py-0.5 rounded-md">$1</span>');
            
            document.getElementById('detail-lyrics').innerHTML = safeText;
            renderMiniList();
            loadComments(id);
        }

        function loadComments(songId) {
            if(unsubscribeComments) unsubscribeComments();
            const list = document.getElementById('comments-list');
            list.innerHTML = '<div class="text-center text-slate-400 py-4">載入留言中...</div>';

            // 💡 修正3：移除複合查詢的 orderBy，改用 JavaScript 前端手動排序，完美避開 Firebase 索引報錯！
            const q = query(collection(appDb, "comments"), where("songId", "==", songId));
            
            unsubscribeComments = onSnapshot(q, (snapshot) => {
                list.innerHTML = '';
                if(snapshot.empty) {
                    list.innerHTML = '<div class="text-center text-slate-400 py-4 text-sm">還沒有人留言，搶頭香幫偶像應援吧！</div>';
                    return;
                }

                // 將抓下來的資料轉換成陣列，並依照時間降冪排序 (最新的在最上面)
                let commentsArray = [];
                snapshot.forEach((doc) => commentsArray.push(doc.data()));
                commentsArray.sort((a, b) => {
                    const t1 = a.createdAt ? a.createdAt.toMillis() : Date.now();
                    const t2 = b.createdAt ? b.createdAt.toMillis() : Date.now();
                    return t2 - t1; 
                });

                commentsArray.forEach((data) => {
                    const date = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleString('zh-TW', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}) : '剛剛';
                    
                    // 💡 修正4：判斷是否有站長回覆，有的話就印出站長專屬回覆框
                    let replyHtml = '';
                    if (data.reply) {
                        replyHtml = `
                            <div class="mt-3 bg-[#F7CAC9]/10 border border-[#F7CAC9]/30 p-3 rounded-lg relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-[#F7CAC9]"></div>
                                <span class="text-[#e87a78] font-bold text-xs flex items-center gap-1">💎 站長回覆：</span>
                                <p class="text-sm text-slate-700 mt-1 pl-1">${data.reply.replace(/</g, "&lt;")}</p>
                            </div>
                        `;
                    }

                    list.innerHTML += `
                        <div class="bg-white border border-slate-100 p-4 rounded-xl shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-slate-700 text-sm">👤 ${data.name.replace(/</g, "&lt;")}</span>
                                <span class="text-xs text-slate-400">${date}</span>
                            </div>
                            <p class="text-slate-600 text-sm whitespace-pre-wrap">${data.text.replace(/</g, "&lt;")}</p>
                            ${replyHtml}
                        </div>
                    `;
                });
            });
        }

        window.submitComment = async function() {
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');
            const name = nameInput.value.trim(), text = textInput.value.trim();
            const btn = document.getElementById('btn-submit-comment');

            if(!name || !text) return window.showMessage('暱稱跟留言都要填寫喔！');
            if(!currentSongId) return;

            btn.disabled = true;
            btn.innerText = "傳送中...";
            try {
                await addDoc(collection(appDb, "comments"), { songId: currentSongId, name: name, text: text, createdAt: serverTimestamp() });
                textInput.value = ''; 
                window.showMessage('留言成功！💎');
            } catch(e) {
                window.showMessage('留言失敗，請稍後再試');
            } finally {
                btn.disabled = false;
                btn.innerText = "送出留言";
            }
        }
    </script>
</body>
</html>
